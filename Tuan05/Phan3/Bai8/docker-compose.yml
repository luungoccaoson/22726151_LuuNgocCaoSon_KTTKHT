version: "3.9"

services:
  django:
    build: ./backend
    container_name: django_app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: python manage.py runserver 0.0.0.0:8000

  celery:
    build: ./backend
    container_name: celery_worker
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - django
    command: celery -A backend worker --loglevel=info

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
